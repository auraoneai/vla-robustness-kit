name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: python -m pip install pytest
      - run: python -m pytest -q
      - run: vla-robustness-kit run examples/mock_episode_set --policy mock --out report.md

